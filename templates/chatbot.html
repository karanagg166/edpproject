<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pantry — AI Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header>
    <h1>💬 AI Assistant</h1>
    <p>Ask me anything — food, nutrition, health, recipes &amp; more</p>
</header>

<div class="chat-container">
    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your question here..." />
        <button onclick="sendMessage()" id="send-btn">Send</button>
    </div>
</div>

<a href="/" class="back-link">⬅ Back to Dashboard</a>

<script>
function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (message === "") return;

    const chatBox = document.getElementById("chat-box");
    const sendBtn = document.getElementById("send-btn");

    // Show user message (safe — textContent)
    const userDiv = document.createElement("div");
    userDiv.className = "user-msg";
    userDiv.textContent = message;
    chatBox.appendChild(userDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    // Show loading
    const loadingDiv = document.createElement("div");
    loadingDiv.className = "bot-msg";
    loadingDiv.innerHTML = '<span class="spinner"></span> Thinking...';
    chatBox.appendChild(loadingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    sendBtn.disabled = true;
    input.value = "";

    fetch("/get_response", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(response => response.json())
    .then(data => {
        loadingDiv.remove();

        const botDiv = document.createElement("div");
        botDiv.className = "bot-msg";
        botDiv.innerHTML = marked.parse(data.reply);
        chatBox.appendChild(botDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        sendBtn.disabled = false;
    })
    .catch(() => {
        loadingDiv.remove();

        const errDiv = document.createElement("div");
        errDiv.className = "bot-msg";
        errDiv.textContent = "⚠️ Error getting response. Please try again.";
        chatBox.appendChild(errDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        sendBtn.disabled = false;
    });
}

// Enter to Send
document.getElementById("user-input")
    .addEventListener("keypress", function(event) {
        if (event.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
