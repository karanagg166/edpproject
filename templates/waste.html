<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pantry — Waste Reduction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>♻️ Gamified Waste Reduction</h1>
    <p>Earn points and rewards for reducing food waste</p>
</header>

<div class="container" style="text-align:center;">

    <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;">
        <div class="stat-card" style="flex:1;min-width:140px;">
            <div class="stat-label">Score</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-card" style="flex:1;min-width:140px;">
            <div class="stat-label">Streak</div>
            <div class="stat-value" id="streak">0</div>
            <div class="stat-label">days</div>
        </div>
    </div>

    <div class="stat-card" style="margin-top:16px;">
        <div class="stat-label">Progress to Next Reward</div>
        <div class="progress" style="margin-top:10px;">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div class="reward-text" id="reward">No rewards yet</div>
    </div>

    <div class="stat-card" style="margin-top:16px;">
        <div class="stat-label" style="margin-bottom:12px;">Update Food Status</div>

        <button onclick="useFood()" class="btn btn-primary" style="margin:4px;">
            ✅ Used Food (+10 pts)
        </button>

        <button onclick="wasteFood()" class="btn btn-danger" style="margin:4px;">
            ❌ Wasted Food (-5 pts)
        </button>
    </div>

</div>

<a href="/" class="back-link">⬅ Back to Dashboard</a>

<script>
function loadStats() {
    fetch("/waste_stats")
        .then(res => res.json())
        .then(data => {
            document.getElementById("score").textContent = data.score;
            document.getElementById("streak").textContent = data.streak;

            let progress = Math.min(100, (data.score % 50) * 2);
            document.getElementById("progress").style.width = progress + "%";

            document.getElementById("reward").textContent = data.reward;
        })
        .catch(() => {
            document.getElementById("reward").textContent = "⚠️ Error loading stats";
        });
}

function useFood() {
    fetch("/use_food", {method: "POST"})
        .then(() => loadStats())
        .catch(() => alert("Error recording food usage"));
}

function wasteFood() {
    fetch("/waste_food", {method: "POST"})
        .then(() => loadStats())
        .catch(() => alert("Error recording food waste"));
}

loadStats();
</script>

</body>
</html>
