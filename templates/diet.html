<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pantry — Diet Plan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>🥗 Personalized Diet Plan</h1>
    <p>AI-generated meal plans tailored to your health goals</p>
</header>

<div class="container">

    <label style="color:var(--text-secondary);font-size:0.9rem;display:block;margin-bottom:6px;">
        Select Your Goal
    </label>

    <select id="goal">
        <option value="weight loss">🏃 Weight Loss</option>
        <option value="muscle gain">💪 Muscle Gain</option>
        <option value="heart healthy diet">❤️ Heart Healthy Diet</option>
        <option value="diabetes friendly diet">🩺 Diabetes Friendly Diet</option>
        <option value="balanced healthy diet">🌿 Balanced Healthy Diet</option>
    </select>

    <button onclick="generateDiet()" id="diet-btn" class="btn btn-primary btn-full" style="margin-top:16px;">
        Generate Diet Plan
    </button>

    <div id="result" style="margin-top:20px;"></div>
    <div id="error-msg" class="status-msg"></div>

</div>

<a href="/" class="back-link">⬅ Back to Dashboard</a>

<script>
function generateDiet() {
    const goal = document.getElementById("goal").value;
    const resultBox = document.getElementById("result");
    const btn = document.getElementById("diet-btn");
    const errorMsg = document.getElementById("error-msg");

    errorMsg.className = "status-msg";
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Generating...';
    resultBox.innerHTML = "";

    fetch("/generate_diet", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({goal: goal})
    })
    .then(res => res.json())
    .then(data => {
        btn.disabled = false;
        btn.textContent = "Generate Diet Plan";

        let text = data.diet;
        let sections = text.split("\n\n");
        let html = "";

        sections.forEach(section => {
            let lines = section.split("\n");
            let title = lines[0];
            let items = lines.slice(1);

            if (title.trim() === "") return;

            html += '<div class="diet-card">';
            html += '<h3>' + escapeHtml(title) + '</h3>';
            html += '<ul>';

            items.forEach(item => {
                if (item.trim() !== "") {
                    html += '<li>' + escapeHtml(item.replace(/^-\s*/, "")) + '</li>';
                }
            });

            html += '</ul></div>';
        });

        resultBox.innerHTML = html;
    })
    .catch(() => {
        btn.disabled = false;
        btn.textContent = "Generate Diet Plan";
        errorMsg.textContent = "⚠️ Error generating diet plan. Check your connection.";
        errorMsg.className = "status-msg error";
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

</body>
</html>
