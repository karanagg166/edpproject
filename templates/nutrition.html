<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pantry — Nutritional Insights</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>🥦 Nutritional Insights</h1>
    <p>Calculate calories, protein, fat &amp; carbs using USDA data</p>
</header>

<div class="container">

    <div id="food-container">
        <div class="food-row">
            <input type="text" class="food" placeholder="Food item (e.g., rice)">
            <input type="number" class="quantity" placeholder="Quantity in grams">
        </div>
    </div>

    <button onclick="addRow()" class="btn btn-secondary btn-full" style="margin-top:12px;">
        ➕ Add Another Food
    </button>

    <button onclick="calculate()" id="calc-btn" class="btn btn-primary btn-full" style="margin-top:8px;">
        Calculate Nutrition
    </button>

    <div id="result" style="margin-top:20px;"></div>
    <div id="error-msg" class="status-msg"></div>

</div>

<a href="/" class="back-link">⬅ Back to Dashboard</a>

<script>
function addRow() {
    const container = document.getElementById("food-container");
    const row = document.createElement("div");
    row.className = "food-row";
    row.innerHTML = `
        <input type="text" class="food" placeholder="Food item (e.g., rice)">
        <input type="number" class="quantity" placeholder="Quantity in grams">
    `;
    container.appendChild(row);
}

function calculate() {
    const foods = document.getElementsByClassName("food");
    const quantities = document.getElementsByClassName("quantity");
    const btn = document.getElementById("calc-btn");
    const errorMsg = document.getElementById("error-msg");

    let items = [];

    for (let i = 0; i < foods.length; i++) {
        const foodName = foods[i].value.trim().toLowerCase();
        const qty = quantities[i].value;
        if (foodName === "" || qty === "") continue;
        items.push({food: foodName, quantity: qty});
    }

    if (items.length === 0) {
        errorMsg.textContent = "Please enter at least one food item with quantity.";
        errorMsg.className = "status-msg error";
        return;
    }

    errorMsg.className = "status-msg";
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Calculating...';

    fetch("/nutrition_calc", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({items: items})
    })
    .then(response => response.json())
    .then(data => {
        btn.disabled = false;
        btn.textContent = "Calculate Nutrition";

        let html = `<table>
            <tr><th>Nutrient</th><th>Amount</th></tr>
            <tr><td>🔥 Calories</td><td>${data.calories} kcal</td></tr>
            <tr><td>💪 Protein</td><td>${data.protein} g</td></tr>
            <tr><td>🧈 Fat</td><td>${data.fat} g</td></tr>
            <tr><td>🌾 Carbs</td><td>${data.carbs} g</td></tr>
        </table>`;

        if (data.not_found && data.not_found.length > 0) {
            html += '<p style="color:var(--warning);margin-top:12px;font-size:0.85rem;">⚠️ Not found: ' +
                    data.not_found.join(", ") + '</p>';
        }

        document.getElementById("result").innerHTML = html;
    })
    .catch(() => {
        btn.disabled = false;
        btn.textContent = "Calculate Nutrition";
        errorMsg.textContent = "⚠️ Error connecting to USDA API. Please try again.";
        errorMsg.className = "status-msg error";
    });
}
</script>

</body>
</html>
