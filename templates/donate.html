<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pantry — Food Donation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>🤝 Food Donation &amp; Sharing</h1>
    <p>Find nearby NGOs and donation centers in your city</p>
</header>

<div class="container" style="text-align:center;">

    <p style="color:var(--text-secondary);margin-bottom:16px;font-size:0.9rem;">
        Enter your city to find nearby food donation centers.
    </p>

    <input id="location" type="text" placeholder="Enter your city (e.g., Delhi, Mumbai)"
           style="max-width:360px;margin:0 auto;display:block;">

    <button onclick="findDonation()" id="donate-btn" class="btn btn-primary btn-full"
            style="margin-top:16px;max-width:360px;">
        🔍 Find NGOs
    </button>

    <div id="error-msg" class="status-msg"></div>

    <div id="result" style="margin-top:20px;text-align:left;color:var(--text-secondary);line-height:1.8;"></div>

</div>

<a href="/" class="back-link">⬅ Back to Dashboard</a>

<script>
function findDonation() {
    const location = document.getElementById("location").value.trim();
    const btn = document.getElementById("donate-btn");
    const errorMsg = document.getElementById("error-msg");
    const result = document.getElementById("result");

    if (location === "") {
        errorMsg.textContent = "Please enter a city name.";
        errorMsg.className = "status-msg error";
        return;
    }

    errorMsg.className = "status-msg";
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Finding centers...';
    result.innerHTML = "";

    fetch("/find_donation", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({location: location})
    })
    .then(res => res.json())
    .then(data => {
        btn.disabled = false;
        btn.textContent = "🔍 Find NGOs";
        result.innerHTML = data.result;
    })
    .catch(() => {
        btn.disabled = false;
        btn.textContent = "🔍 Find NGOs";
        errorMsg.textContent = "⚠️ Error finding donation centers. Please try again.";
        errorMsg.className = "status-msg error";
    });
}

// Enter to search
document.getElementById("location")
    .addEventListener("keypress", function(event) {
        if (event.key === "Enter") findDonation();
    });
</script>

</body>
</html>
